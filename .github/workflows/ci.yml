# ─────────────────────────────────────────────
# ACEest Fitness & Gym – GitHub Actions CI/CD
# ─────────────────────────────────────────────

name: ACEest CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:

  # ── 1. Lint & Test ──────────────────────────
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with Flake8
        run: |
          flake8 app.py --max-line-length=120 --statistics

      - name: Run Pytest
        run: |
          pytest test_app.py -v --tb=short

  # ── 2. Docker Build & Push ──────────────────
  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t aceest-fitness-gym:${{ github.sha }} .
          docker build -t aceest-fitness-gym:latest .

      - name: Verify Docker image
        run: |
          docker images aceest-fitness-gym

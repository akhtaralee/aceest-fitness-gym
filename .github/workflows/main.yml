# ─────────────────────────────────────────────
# ACEest Fitness & Gym – CI/CD Pipeline
# Triggered on every push & pull_request
# ─────────────────────────────────────────────

name: ACEest CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ──────────────── Stage 1: Build & Lint ────────────────
  build-and-lint:
    name: 🔍 Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with Flake8
        run: |
          echo "🔍 Running syntax & style checks..."
          flake8 app.py --max-line-length=120 --statistics
          echo "✅ Lint passed"

  # ──────────────── Stage 2: Docker Image Assembly ────────────────
  docker-build:
    name: 🐳 Docker Image Assembly
    runs-on: ubuntu-latest
    needs: build-and-lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          echo "🐳 Building Docker image..."
          docker build -t aceest-fitness-gym:${{ github.sha }} .
          echo "✅ Docker image built successfully"

      - name: Verify Docker image
        run: |
          docker images aceest-fitness-gym

  # ──────────────── Stage 3: Automated Testing ────────────────
  test:
    name: 🧪 Automated Testing
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image for testing
        run: docker build -t aceest-fitness-gym:test .

      - name: Run Pytest inside container
        run: |
          echo "🧪 Executing Pytest suite in container..."
          docker run --rm aceest-fitness-gym:test \
            python -m pytest test_app.py -v --tb=short
          echo "✅ All tests passed"

      - name: Container health check
        run: |
          echo "🏥 Starting container for health check..."
          docker run -d --name aceest-test -p 5000:5000 aceest-fitness-gym:test
          sleep 5
          curl -f http://localhost:5000/health || exit 1
          echo "✅ Health check passed"
          docker stop aceest-test
          docker rm aceest-test
